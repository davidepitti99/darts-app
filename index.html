<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a1a">
<title>Dart Aim</title>
<style>
  :root { --bg:#2a2a2a; --panel:#1a1a1a; --field:#444; --accent:#ffd23f; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
  }
  body {
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .app { max-width: 560px; margin: 0 auto; padding: 12px 14px 28px; }
  h1 { font-size: 17px; font-weight: 700; margin: 4px 0 12px; text-align: center; }
  .board-wrap { position: relative; width: 100%; }
  canvas { width: 100%; height: auto; display: block; border-radius: 12px; }

  .segmented {
    display: flex; gap: 6px; background: var(--panel); padding: 5px;
    border-radius: 12px; margin: 0 0 14px;
  }
  .segmented button {
    flex: 1; padding: 11px 8px; font-size: 15px; font-weight: 600;
    color: #cfcfcf; background: transparent; border: none; border-radius: 8px;
    cursor: pointer;
  }
  .segmented button.active { background: var(--accent); color: #1a1a1a; }

  .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 12px; color: #b9b9b9; }
  select, input {
    background: var(--field); color: #fff; border: 1px solid #555;
    border-radius: 10px; padding: 12px 10px; font-size: 17px; width: 100%;
    -webkit-appearance: none; appearance: none;
  }
  input:focus, select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
  .info {
    margin-top: 14px; background: var(--panel); border-radius: 12px; padding: 16px;
    line-height: 1.5; font-size: 14px;
  }
  .info .aim { font-size: 26px; font-weight: 800; color: var(--accent); line-height: 1.2; }
  .info .aim .next { color: #fff; font-size: 17px; font-weight: 700; margin-left: 0.35em; }
  .info .row { color: #cfcfcf; margin-top: 8px; }
  .info .warn { color: #ff8a8a; }
  .k { color: #8f8f8f; }
</style>
</head>
<body>
<div class="app">
  <h1>Dart Strategy Viewer</h1>

  <div class="segmented" id="modeToggle"></div>

  <div class="board-wrap">
    <canvas id="board" width="800" height="800"></canvas>
  </div>

  <div class="controls">
    <div class="field">
      <label for="score">Score left</label>
      <input id="score" type="number" inputmode="numeric" min="2" value="501">
    </div>
    <div class="field">
      <label for="darts">Darts left this turn</label>
      <select id="darts">
        <option value="3">3</option>
        <option value="2">2</option>
        <option value="1">1</option>
      </select>
    </div>
    <div class="field full">
      <label for="sigma">Accuracy &sigma; (mm)</label>
      <select id="sigma"></select>
    </div>
  </div>

  <div class="info" id="info"></div>
</div>

const cv = document.getElementById('board');

function scale() { return cv.width / (2 * VIEW); }

  const s = scale();

function ca(amRad) { return amRad - Math.PI / 2; }

function wedge(rInner, rOuter, amCenter, color) {

    const rc = (i % 2 === 0) ? C_RED : C_GREEN;
    const am = i * SECTOR;
    wedge(OUTER_BULL_RADIUS, TRIPLE_INNER, am, sc);
    wedge(TRIPLE_INNER, TRIPLE_OUTER, am, rc);
    wedge(TRIPLE_OUTER, DOUBLE_INNER, am, sc);
    wedge(DOUBLE_INNER, DOUBLE_OUTER, am, rc);
  }
  const s = scale(), cx = cv.width / 2, cy = cv.height / 2;
  ctx.beginPath(); ctx.arc(cx, cy, OUTER_BULL_RADIUS * s, 0, 2*Math.PI);
  ctx.fillStyle = C_GREEN; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, BULL_RADIUS * s, 0, 2*Math.PI);
  ctx.fillStyle = C_RED; ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold ' + Math.round(cv.width * 0.028) + 'px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  for (let i = 0; i < 20; i++) {
    const am = i * SECTOR;
    const rx = (DOUBLE_OUTER + 22) * Math.sin(am);
    const ry = (DOUBLE_OUTER + 22) * Math.cos(am);
    const [X, Y] = px(rx, ry);
    ctx.fillText(String(SECTORS[i]), X, Y);
  }
}

function drawAim(x, y, sigma) {
  const s = scale();
  const [X, Y] = px(x, y);
  for (const [k, a, w] of [[1, 0.9, 3], [2, 0.5, 2]]) {
    ctx.beginPath();
    ctx.arc(X, Y, k * sigma * s, 0, 2 * Math.PI);
    ctx.strokeStyle = 'rgba(255,210,63,' + a + ')';
    ctx.setLineDash([6, 5]);
    ctx.lineWidth = w;
    ctx.stroke();
  }
  ctx.setLineDash([]);
  const r = cv.width * 0.03;
  ctx.strokeStyle = 'yellow';
  ctx.lineWidth = Math.max(3, cv.width * 0.006);
  ctx.beginPath();
  ctx.moveTo(X - r, Y - r); ctx.lineTo(X + r, Y + r);
  ctx.moveTo(X - r, Y + r); ctx.lineTo(X + r, Y - r);
  ctx.stroke();
}

// ── UI wiring ────────────────────────────────────────────────────────────
const elScore = document.getElementById('score');
const elDarts = document.getElementById('darts');
const elSigma = document.getElementById('sigma');
const elInfo = document.getElementById('info');
const elModeToggle = document.getElementById('modeToggle');

let currentModeKey = DATA.default_mode;

function mode() { return DATA.modes.find(m => m.key === currentModeKey); }

// How much the optimal aim for this state depends on skill (sigma):
//   drift   = max distance (mm) the aim point moves across all sigmas
//   regions = number of distinct target beds visited across sigmas
function sigmaDependence(m, key) {
  const pol = DATA.policies[m.key];
  const pts = [];
  for (const s of m.sigmas) {
    const e = pol[String(s)] && pol[String(s)][key];
    if (e) pts.push([e[1], e[2], e[0]]);   // x, y, aim label
  }
  if (pts.length < 2) return null;
  let drift = 0;
  for (let i = 0; i < pts.length; i++)
    for (let j = i + 1; j < pts.length; j++) {
      const d = Math.hypot(pts[i][0] - pts[j][0], pts[i][1] - pts[j][1]);
      if (d > drift) drift = d;
    }
  const regions = new Set(pts.map(p => p[2].replace(/\*$/, ''))).size;
  return { drift, regions, nSigmas: pts.length };
}

// Natural-gap severity colours. Drift is bimodal: stable checkouts sit well
// below ~75 mm; the common T20->bottom-left scoring swing sits above ~150 mm.
// Regions: 1 = green, 2-3 = orange, 4+ = red.
const SEV_GREEN = '#44bb44', SEV_ORANGE = '#ff9f1a', SEV_RED = '#ff5555';
const DRIFT_SMALL_MM = 75, DRIFT_LARGE_MM = 150;
function driftColor(drift) {
  if (drift < DRIFT_SMALL_MM) return SEV_GREEN;
  if (drift < DRIFT_LARGE_MM) return SEV_ORANGE;
  return SEV_RED;
}
function regionColor(n) {
  if (n <= 1) return SEV_GREEN;
  if (n <= 3) return SEV_ORANGE;
  return SEV_RED;
}

function buildModeToggle() {
  elModeToggle.innerHTML = '';
  if (DATA.modes.length < 2) { elModeToggle.style.display = 'none'; return; }
  for (const m of DATA.modes) {
    const b = document.createElement('button');
    b.textContent = m.label;
    b.dataset.key = m.key;
    b.className = (m.key === currentModeKey) ? 'active' : '';
    b.addEventListener('click', () => selectMode(m.key));
    elModeToggle.appendChild(b);
  }
}

function populateSigmas() {
  const m = mode();
  const prev = parseInt(elSigma.value, 10);
  elSigma.innerHTML = '';
  for (const s of m.sigmas) {
    const o = document.createElement('option');
    o.value = String(s); o.textContent = s + ' mm';
    elSigma.appendChild(o);
  }
  let pick = m.sigmas.includes(prev) ? prev
           : (m.sigmas.includes(25) ? 25 : m.sigmas[0]);
  elSigma.value = String(pick);
}

function selectMode(key) {
  currentModeKey = key;
  const m = mode();
  for (const b of elModeToggle.children)
    b.className = (b.dataset.key === key) ? 'active' : '';
  populateSigmas();
  elScore.max = String(m.start_score);
  const cur = parseInt(elScore.value, 10);
  if (!Number.isFinite(cur) || cur > m.start_score) elScore.value = String(m.start_score);
  update();
}

function aimPoints(label) {
  const lab = label.replace(/\*$/, '').trim();
  if (lab === 'Miss' || lab === 'M') return [0, false];
  if (lab.startsWith('Bull')) {
    if (lab.indexOf('25') >= 0) return [25, false];
    return [50, true];
  }
  const kind = lab.charAt(0), n = parseInt(lab.slice(1), 10);
  if (!Number.isFinite(n)) return [0, false];
  if (kind === 'T') return [n * 3, false];
  if (kind === 'D') return [n * 2, true];
  if (kind === 'S') return [n, false];
  return [0, false];
}

function hitContinuation(policy, score, dartsLeft) {
  const steps = [];
  let s = score, d = dartsLeft;
  while (d >= 1) {
    const entry = policy[s + ',' + d];
    if (!entry) break;
    const aim = entry[0];
    const clean = aim.replace(/\*$/, '');
    const [pts, isDbl] = aimPoints(aim);
    const nxt = s - pts;
    if (nxt === 0 && isDbl) { steps.push([s, d, clean, 0, 'checkout']); break; }
    if (nxt < 0 || nxt === 0) { steps.push([s, d, clean, null, 'bust']); break; }
    if (d === 1) { steps.push([s, d, clean, nxt, 'end_turn']); break; }
    steps.push([s, d, clean, nxt, 'continue']);
    s = nxt; d = d - 1;
  }
  return steps;
}

function formatHitPath(steps) {
  return steps.map(s => s[2]);
}

function update() {
  drawBoard();
  const m = mode();
  const sigma = parseInt(elSigma.value, 10);
  const policy = DATA.policies[m.key][String(sigma)] || {};
  const score = parseInt(elScore.value, 10);
  const darts = parseInt(elDarts.value, 10);

  if (!Number.isFinite(score) || !Number.isFinite(darts)) {
    elInfo.innerHTML = '<div class="warn">Enter a score and darts left.</div>';
    return;
  }
  const entry = policy[score + ',' + darts];
  if (!entry) {
    elInfo.innerHTML = '<div class="warn">No optimal aim for score '
      + score + ' with ' + darts + ' dart(s) left.</div>'
      + '<div class="row k">(Score must be a reachable finishing state, 2\u2013'
      + m.start_score + '.)</div>';
    return;
  }
  const [aim, x, y, et] = entry;
  const aims = formatHitPath(hitContinuation(policy, score, darts));
  const aimClean = aims.length ? aims[0] : (aim.endsWith('*') ? aim.slice(0, -1) : aim);
  drawAim(x, y, sigma);
  let html = '<div class="aim">Aim: ' + aimClean;
  for (let i = 1; i < aims.length; i++)
    html += '<span class="next">' + aims[i] + '</span>';
  html += '</div>';
  html += '<div class="row"><span class="k">Expected turns to finish:</span> ' + et.toFixed(3) + '</div>';
  const dep = sigmaDependence(m, score + ',' + darts);
  if (dep) {
    html += '<div class="row"><span class="k">Aim &sigma;-sensitivity across '
      + dep.nSigmas + ' &sigma;:</span></div>'
      + '<div class="row">'
      + '<span style="color:' + driftColor(dep.drift) + '">drift '
      + dep.drift.toFixed(0) + ' mm</span>'
      + '<span class="k"> &middot; </span>'
      + '<span style="color:' + regionColor(dep.regions) + '">'
      + dep.regions + ' region' + (dep.regions === 1 ? '' : 's') + ' visited</span>'
      + '</div>';
  }
  elInfo.innerHTML = html;
}

elScore.addEventListener('input', update);
elDarts.addEventListener('change', update);
elSigma.addEventListener('change', update);

function sizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const cssW = cv.clientWidth;
  cv.width = Math.round(cssW * dpr);
  cv.height = cv.width;
  update();
}
window.addEventListener('resize', sizeCanvas);
window.addEventListener('orientationchange', sizeCanvas);

buildModeToggle();
selectMode(currentModeKey);
sizeCanvas();
</script>
</body>
</html>
